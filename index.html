function renderCoach(){
  const c = S.userCoach;
  const t = getUserTeam();
  if(!c || !t) return `<div class="card"><h2>Coach</h2><div class="muted">Finish setup first.</div></div>`;

  const xpPct = Math.round((c.xp/100)*100);
  const xpBar = `<div class="progress"><div class="bar" style="width:${xpPct}%;"></div></div>`;
  const car = c.career || {wins:0,losses:0,titles:0,tourneyWins:0,finalFours:0};

  const blocks = ARCH.map(arch=>{
    const nodes = (SKILL_NODES[arch]||[]).map(n=>{
      const st = c.skillsTree[arch][n.key];
      const cost = nodeCost(arch, n.key, st.lvl);
      const dis = (st.lvl>=st.max) ? "disabled" : (!S.settings.infiniteSP && c.skillPoints<cost ? "disabled":"");
      return `
        <div class="itemCard">
          <div class="itemTop">
            <div>
              <div class="itemTitle">${U.safe(n.name)} <span class="badge bAcc2">Tier ${n.tier}</span></div>
              <div class="itemMeta">${U.safe(n.desc)} • Lv ${st.lvl}/${st.max}</div>
            </div>
            <button class="btnAccent" data-act="perk" data-arch="${U.safe(arch)}" data-key="${U.safe(n.key)}" ${dis}>Cost ${S.settings.infiniteSP?"∞":cost}</button>
          </div>
        </div>
      `;
    }).join("");
    return `<div class="sep"></div><h2>${U.safe(arch)} <span class="badge bAcc2">Levels ${sumArchLevels(c,arch)}</span></h2><div class="list">${nodes}</div>`;
  }).join("");

  return `
    <div class="grid">
      <div class="card">
        <h2>${U.safe(c.name)}</h2>
        <div class="row">
          <span class="chip"><span class="k">TEAM</span>${U.safe(t.name)}</span>
          <span class="chip"><span class="k">SP</span>${S.settings.infiniteSP ? "∞" : c.skillPoints}</span>
          <span class="chip"><span class="k">SEASONS</span>${(c.yearsCoached||0)}/35</span>
        </div>
        <div class="sep"></div>
        <div class="row">
          <span class="chip"><span class="k">CAREER</span>${car.wins}-${car.losses}</span>
          <span class="chip"><span class="k">TITLES</span>${car.titles}</span>
          <span class="chip"><span class="k">TW</span>${car.tourneyWins}</span>
          <span class="chip"><span class="k">FF</span>${car.finalFours}</span>
        </div>
        <div class="sep"></div>
        <div class="muted">XP</div>
        ${xpBar}
        <div class="muted mini">${S.settings.infiniteSP ? "∞" : (c.xp+"/100")}</div>
        <div class="sep"></div>
        <div class="muted mini">Legacy: <b>${U.fmt(c.legacy||coachLegacyScore(c))}</b> • Difficulty: <b>${diff().toFixed(2)}x</b></div>
      </div>
      <div class="card">
        <h2>Skill Tree</h2>
        <div class="muted mini">Perk costs scale by tier + level. XP/SP speed in Settings.</div>
        ${blocks}
      </div>
    </div>
  `;
}

function renderRecruiting(){
  const t = getUserTeam();
  const c = S.userCoach;
  if(!t || !c) return `<div class="card"><h2>Recruiting</h2><div class="muted">Finish setup first.</div></div>`;

  const open = (S.phase==="season" && S.weekIndex>=1 && S.weekIndex<=GAME.REG_WEEKS) || (S.phase==="offseason" && S.weekIndex===2);
  if(!open) return `<div class="card"><h2>Recruiting</h2><div class="muted">Recruiting runs during the season and Offseason Wk3.</div></div>`;

  computeNeeds(t);
  const cap = maxStarsByPrestige(t.prestige);
  const remain = t.recruiting.points - t.recruiting.spent;

  const f = S.ui.recruitFilters;
  let list = S.recruits.filter(r=>r.stage==="open");

  if((f.board||"all")==="targets"){
    const offeredIds = new Set((t.recruiting.offered||[]));
    list = list.filter(r=>offeredIds.has(r.id));
  }

  if(S.settings.hideLockedRecruits){
    list = list.filter(r=>canRecruitByPrestige(t, r));
  }
  if(f.pos) list = list.filter(r=>r.pos===f.pos);
  if(f.state) list = list.filter(r=>r.state===f.state);
  if(f.stars) list = list.filter(r=>r.stars>=parseInt(f.stars,10));

  if(f.sort==="ovr") list.sort((a,b)=>b.ovr-a.ovr);
  else if(f.sort==="stars") list.sort((a,b)=>b.stars-a.stars || b.ovr-a.ovr);
  else {
    list.sort((a,b)=>{
      const ra = rankTeams(a).findIndex(x=>x.id===t.id)+1;
      const rb = rankTeams(b).findIndex(x=>x.id===t.id)+1;
      return ra-rb;
    });
  }
  list = list.slice(0, 90);

  const needsBadges = GAME.POS.map(p=>{
    const n=t.needs[p]||0;
    const cls = n>=2 ? "bBad" : (n===1 ? "bWarn" : "bGood");
    return `<span class="badge ${cls}">${p}: ${n}</span>`;
  }).join(" ");

  return `
    <div class="card">
      <div class="rowBetween">
        <h2>Recruiting Board</h2>
        <span class="badge bAcc">Cap ${cap}★ • Pts ${remain}/${t.recruiting.points} • Class ${t.recruiting.commits.length}/${GAME.CLASS_SLOTS}</span>
      </div>

      <div class="sep"></div>
      <div class="itemCard">
        <div class="itemTitle">Team Needs</div>
        <div class="itemMeta">${needsBadges}</div>
        <div class="hint">Needs are shown here so you don’t have to bounce to Roster.</div>
      </div>

      <div class="sep"></div>
      <div class="twoCol">
        <div>
          <label>Position</label>
          <select id="rf_pos">
            <option value="">All</option>
            ${GAME.POS.map(p=>`<option value="${p}" ${f.pos===p?"selected":""}>${p}</option>`).join("")}
          </select>
        </div>
        <div>
          <label>State</label>
          <select id="rf_state">
            <option value="">All</option>
            ${GAME.STATES.map(s=>`<option value="${s}" ${f.state===s?"selected":""}>${s}</option>`).join("")}
          </select>
        </div>
        <div>
          <label>Min Stars</label>
          <select id="rf_stars">
            <option value="">Any</option>
            ${[1,2,3,4,5].map(x=>`<option value="${x}" ${f.stars==x?"selected":""}>${x}★+</option>`).join("")}
          </select>
        </div>
        <div>
          <label>Sort</label>
          <select id="rf_sort">
            <option value="rank" ${f.sort==="rank"?"selected":""}>Your Rank</option>
            <option value="ovr" ${f.sort==="ovr"?"selected":""}>OVR</option>
            <option value="stars" ${f.sort==="stars"?"selected":""}>Stars</option>
          </select>
        </div>
        <div>
          <label>Board</label>
          <select id="rf_board">
            <option value="all" ${(f.board||"all")==="all"?"selected":""}>All</option>
            <option value="targets" ${(f.board||"all")==="targets"?"selected":""}>Targets (Offered)</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:10px">
        <button class="btnAccent" data-act="rf_apply">Apply</button>
        <button data-act="rf_clear">Clear</button>
      </div>

      <div class="sep"></div>
      <div class="list">
        ${list.map(r=>{
          const locked = !canRecruitByPrestige(t, r);
          const offered = hasUserOffer(t, r);
          const myInt = interest(r, t);
          const ranked = rankTeams(r);
          const myRank = ranked.findIndex(x=>x.id===t.id)+1;
          const leader = getTeam(ranked[0].id)?.name || "—";
          const need = (t.needs?.[r.pos]||0) > 0;
          const needBadge = need ? `<span class="badge bWarn">NEED</span>` : ``;
          const canVisit = offered && !locked && remain>=ACTIONS.visit.cost && !r.visitedBy?.[t.id] && r.visitScheduled?.[t.id]==null;
          const visitLabel = r.visitedBy?.[t.id] ? "Visited" : (r.visitScheduled?.[t.id]!=null ? `Scheduled` : "Visit");

          return `
            <div class="itemCard" style="${locked && !r.openToAll ? 'opacity:.78;' : ''}">
              <div class="itemTop">
                <div>
                  <div class="itemTitle">
                    ${"★".repeat(r.stars)}
                    ${r.openToAll?`<span class="badge bGood">OPEN</span>`:""}
                    <span class="badge bAcc">OVR ${r.ovr}</span>
                    ${needBadge}
                    ${U.safe(r.name)}
                  </div>
                  <div class="itemMeta">
                    ${r.pos} • ${r.state} • Your Rank #${myRank} • Leader: ${U.safe(leader)}
                  </div>
                  ${locked && !r.openToAll ? `<div class="itemMeta"><span class="badge bBad">LOCKED (Cap ${cap}★)</span></div>` : ``}
                </div>
              </div>

              <div style="margin-top:8px">
                <div class="progress"><div class="bar" style="width:${myInt}%;"></div></div>
                <div class="itemMeta">Interest: ${myInt}/100</div>
              </div>

              <div class="actionLine">
                <button data-act="offer" data-id="${r.id}" ${offered || locked || !canOfferRecruit(t) ? "disabled":""}>${offered?"Offered":"Offer"}</button>
                <button class="btnAccent" data-act="sell" data-id="${r.id}" data-kind="soft" ${locked||remain<ACTIONS.soft.cost?"disabled":""}>Soft</button>
                <button class="btnWarn" data-act="sell" data-id="${r.id}" data-kind="hard" ${locked||remain<ACTIONS.hard.cost?"disabled":""}>Hard</button>
                <button data-act="sell" data-id="${r.id}" data-kind="sway" ${locked||remain<ACTIONS.sway.cost?"disabled":""}>Sway</button>
                <button class="btnGood" data-act="sell" data-id="${r.id}" data-kind="visit" ${canVisit?"":"disabled"}>${visitLabel}</button>
              </div>
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

              <button class="btnGood" data-act="accept_job" data-id="${o.id}">Accept</button>
            </div>
          </div>
        `).join("")}
      </div>
      <div class="hint">Hard rebuild realism: you can’t skip tiers without real tournament success.</div>
    </div>
  `;
}

function renderRoster(){
  const t = getUserTeam();
  if(!t) return `<div class="card"><h2>Roster</h2><div class="muted">Pick a team first.</div></div>`;

  const pos = S.ui.rosterPos || "";
  let rows = t.roster.slice();
  if(pos) rows = rows.filter(p=>p.pos===pos);
  rows.sort((a,b)=>a.pos.localeCompare(b.pos)||b.ovr-a.ovr);

  return `
    <div class="card">
      <div class="rowBetween">
        <h2>${U.safe(t.name)} Roster</h2>
        <span class="badge bAcc">Roster ${t.roster.length}/13 • Avg OVR ${teamAvgOVR(t)}</span>
      </div>

      <div class="sep"></div>
      <div class="twoCol">
        <div>
          <label>View by Position</label>
          <select id="rv_pos">
            <option value="">All Positions</option>
            ${GAME.POS.map(p=>`<option value="${p}" ${pos===p?"selected":""}>${p}</option>`).join("")}
          </select>
          <div class="row" style="margin-top:10px">
            <button class="btnAccent" data-act="rv_apply">Apply</button>
            <button data-act="rv_clear">Clear</button>
          </div>
        </div>
        <div>

          ensureStats(p);
          return `
            <div class="itemCard">
              <div class="itemTop">
                <div>
                  <div class="itemTitle"><span class="badge bAcc2">${p.pos}</span> <span class="badge bAcc">OVR ${p.ovr}</span> ${U.safe(p.name)}</div>
                  <div class="itemMeta">${p.year}</div>
                </div>
              </div>
            </div>

        }).join("")}
      </div>

function renderSchedule(){
  const t = getUserTeam();
  if(!t) return `<div class="card"><h2>Schedule</h2><div class="muted">Pick a team first.</div></div>`;

  const items=[];
  for(let w=1; w<=GAME.REG_WEEKS; w++){
    const sched = S.league.schedule[w-1];
    const games = (sched?.games||[]).filter(x=>x.home===t.id || x.away===t.id);
    if(!games.length){
      items.push({w, opp:"BYE", res:"—"});
      continue;
    }
    for(let i=0;i<games.length;i++){
      const g=games[i];
      const home=getTeam(g.home), away=getTeam(g.away);
      const opp = (g.home===t.id) ? `${away.name} (H)` : `${home.name} (A)`;
      const res = g.played ? ((g.home===t.id)? `${g.scoreH}-${g.scoreA}` : `${g.scoreA}-${g.scoreH}`) : "—";
      items.push({w, opp, res, conf:g.confGame});
    }
  }
  return `
    <div class="card">
      <h2>${U.safe(t.name)} Schedule</h2>
      <div class="sep"></div>
      <div class="list">
        ${items.map(x=>`
          <div class="itemCard">
            <div class="itemTop">
              <div class="itemTitle">Week ${x.w}</div>
              <span class="badge ${x.conf?"bAcc2":"bAcc"}">${U.safe(x.res)}</span>
            </div>
            <div class="itemMeta">${U.safe(x.opp)} ${x.conf?`• <span class="badge bAcc2">CONF</span>`:""}</div>
          </div>
        `).join("")}
        <div class="itemCard">
          <div class="itemTitle">Postseason</div>
          <div class="itemMeta">Week 16: Conference Tournaments • Week 17: Selection • NCAA: First Four → Title</div>
        </div>
      </div>
    </div>
  `;
}

function renderBracket(){
  if(!S.post?.ncaa) return `<div class="card"><h2>Bracket</h2><div class="muted">No tournament bracket yet.</div></div>`;

  const N = S.post.ncaa;
  const my = getUserTeam();
  const myId = my?.id;

  const regions = N.regions || [];
  const regionSlots = N.regionSlots || {};

  function slotLabel(slot){
    if(!slot) return "—";
    if(slot.source==="playin"){
      const p=slot.playin;
      const A=getTeam(p.a)?.name||"—";
      const B=getTeam(p.b)?.name||"—";
      const winner = resolvePlayInSlot(slot);
      if(winner){
        return `${getTeam(winner).name}`;
      }
      return `Winner of ${A} / ${B}`;
    }
    return getTeam(slot.teamId)?.name || "—";
  }

  // Map R64 results to quick lookup
  const r64 = (N.rounds?.r64||[]);
  const resMap = new Map();
  for(const m of r64){
    const aId = (m.a?.source==="playin") ? null : m.a?.teamId;
    const bId = (m.b?.source==="playin") ? null : m.b?.teamId;
    const key = `${m.region}|${m.a?.seed}v${m.b?.seed}|${m.a?.teamId}|${m.b?.teamId}`;
    if(m.res) resMap.set(key, m.res);
  }

  return `
    <div class="card">
      <div class="rowBetween">
        <h2>NCAA Bracket (68)</h2>
        <span class="badge bAcc">${U.safe(weekName())}</span>
      </div>
      <div class="hint">This is the live bracket view. Your team is highlighted when visible.</div>
      <div class="sep"></div>

      <div class="itemCard">
        <div class="itemTitle">First Four</div>
        <div class="itemMeta">
          ${N.playIn16.map(m=>{
            const A=getTeam(m.a)?.name||"—", B=getTeam(m.b)?.name||"—";
            const line = m.res ? `${A} ${m.res.h}-${m.res.a} ${B}` : `${A} vs ${B}`;
            return `<span class="badge bAcc2">16: ${U.safe(line)}</span>`;
          }).join(" ")}
        </div>
        <div class="itemMeta">
          ${N.playIn11.map(m=>{
            const A=getTeam(m.a)?.name||"—", B=getTeam(m.b)?.name||"—";
            const line = m.res ? `${A} ${m.res.h}-${m.res.a} ${B}` : `${A} vs ${B}`;
            return `<span class="badge bAcc2">11: ${U.safe(line)}</span>`;
          }).join(" ")}
        </div>
      </div>

      <div class="sep"></div>

      <div class="brGrid">
        ${regions.map(reg=>{
          const slots = (regionSlots[reg]||[]).slice().sort((a,b)=>a.seed-b.seed);
          const seedMap = new Map(slots.map(s=>[s.seed,s]));
          const pairs = [[1,16],[8,9],[5,12],[4,13],[6,11],[3,14],[7,10],[2,15]];

          const matches = pairs.map(([aS,bS])=>{
            const A = seedMap.get(aS);
            const B = seedMap.get(bS);
            const aName = slotLabel(A);
            const bName = slotLabel(B);
            const aId = (A?.source==="playin") ? resolvePlayInSlot(A) : A?.teamId;
            const bId = (B?.source==="playin") ? resolvePlayInSlot(B) : B?.teamId;

            const aYou = (aId && myId && aId===myId);
            const bYou = (bId && myId && bId===myId);

            const played = (A && B && N.rounds?.r64?.some(m=>{
              const ra = (m.a?.seed===aS && m.b?.seed===bS && m.region===reg);
              const rb = (m.a?.seed===bS && m.b?.seed===aS && m.region===reg);
              return ra || rb;
            }));

            return `
              <div class="match">
                <div class="teamLine ${aYou?'you':''}">
                  <div><span class="seed">(${aS})</span> ${U.safe(aName)}</div>
                </div>
                <div class="teamLine ${bYou?'you':''}" style="margin-top:4px;">
                  <div><span class="seed">(${bS})</span> ${U.safe(bName)}</div>
                </div>
              </div>
            `;
          }).join("");

          return `
            <div class="regionCard">
              <div class="itemTitle">${U.safe(reg)}</div>
              <div class="itemMeta">Round of 64 matchups</div>
              ${matches}
            </div>
          `;
        }).join("")}
      </div>
    </div>
  `;
}

                  <div class="itemMeta">${U.safe(x.lastSchool||x.school||"—")} • Legacy ${U.fmt(x.legacy)} • Retired ${x.retiredYear||"—"}</div>
                  <div class="itemMeta">W-L ${(x.career?.wins||0)}-${(x.career?.losses||0)} • Titles ${(x.career?.titles||0)} • Tourney Wins ${(x.career?.tourneyWins||0)} • FF ${(x.career?.finalFours||0)}</div>
                </div>
              </div>

          `).join("") : `<div class="muted">No inductees yet.</div>`}
        </div>

/* ---------- Render ---------- */
function render(){
  updateSubline();
  renderDrawerNav();
  const app = document.getElementById("app");

  if(!S){
    app.innerHTML = `
      <div class="card">
        <h2>Welcome</h2>
        <div class="muted">No save found. Start a new dynasty.</div>
        <div class="sep"></div>
        <button class="btnAccent" data-act="new_game">New Game</button>
        <button data-act="load">Load Save</button>
      </div>
    `;
    renderOverlay();
    return;
  }

  const view = ({
    home: renderHome,
    rankings: renderRankings,
    coach: renderCoach,
    recruit: renderRecruiting,
    jobs: renderJobs,
    schedule: renderSchedule,
    roster: renderRoster,
    bracket: renderBracket,
    records: renderRecords,
    settings: renderSettings,
  }[activeTab] || renderHome)();

  app.innerHTML = view;
  renderOverlay();
}

/* ---------- Actions ---------- */
async function handle(act, el){
  try{
    if(act==="drawer_open"){ drawerOpen(); return; }
    if(act==="drawer_close"){ drawerClose(); return; }

    if(act==="new_game"){ newGame(); await save(); toast("New Game","Dynasty created.","good"); render(); return; }
    if(act==="load"){
      const v=await loadSave();
      if(!v){toast("No Save","No save found.","bad");return;}
      S=v;

      // backfill
      S.settings ??= { hideLockedRecruits:false, xpSpeed:1, spRate:1, infiniteSP:false, difficulty:1.05 };
      S.records ??= buildInitialRecords();
      S.polls ??= { apTop25:[], lastReason:"" };
      S.jobs ??= { offers: [] };
      S.post ??= { confTourneys:[], ncaa:null };
      S.ui ??= { modalQueue:[], rosterPos:"", recruitFilters:{pos:"",state:"",stars:"",sort:"rank",board:"all"}, rankingView:"ap" };

      updatePolls("load");
      toast("Loaded","Save loaded.","good");
      render(); return;
    }

    if(act==="save"){ await save(); toast("Saved","Saved.","good"); render(); return; }
    if(act==="hard_reset"){ await hardReset(); toast("Reset","Save deleted.","warn"); render(); return; }

    if(act==="tab"){ activeTab = el.dataset.tab; drawerClose(); render(); return; }

    if(act==="modal_ack"){ clearModal(); await save(); render(); return; }

    if(act==="retire_continue"){
      clearModal();
      S.userCoach=null;
      S.userTeamId=null;
      S.phase="setup";
      S.weekIndex=0;
      toast("New Career","Create a new coach to continue this world.","good");
      await save(); render(); return;
    }

    if(act==="create_coach"){
      const name = (document.getElementById("coach_name")?.value||"").trim() || ("Coach " + U.pick(NAME.coachLast));
      S.userCoach = makeCoach({name});
      toast("Coach Created", `${S.userCoach.name} (HC)`, "good");
      await save();
      openTeamPicker();
      return;
    }

    if(act==="team_picker"){
      if(!S.userCoach) return toast("Coach Required","Create coach first.","bad");
      openTeamPicker();
      return;
    }
    if(act==="close_picker"){ render(); return; }

    if(act==="select_team"){
      if(!S.userCoach) return toast("Coach Required","Create coach first.","bad");
      const team = getTeam(el.dataset.team);

      const startOnly = !(S.flags && S.flags.startedCareer);
      if(startOnly){
        const bottom25 = S.league.teams.slice().sort((a,b)=>a.prestige-b.prestige).slice(0,25);
        const ok = bottom25.some(x=>x.id===team.id);
        if(!ok) return toast("Bottom 25 Rule","You must start with a Bottom 25 prestige team.","bad");
      }

      S.userTeamId = team.id;
      placeUserCoachOnTeam(team, S.userCoach);
      team.staff.HC = S.userCoach;

      S.phase = "season";
      S.weekIndex = 0;
      S.flags.startedCareer = true;

      resetForNewSeason();
      updatePolls("team_selected");
      toast("Team Selected", `${team.name} • HC`, "good");
      await save(); render(); return;
    }

    if(act==="advance" || act==="sim"){ advance(); await save(); render(); return; }

    if(act==="perk"){
      upgradeNode(S.userCoach, el.dataset.arch, el.dataset.key);
      await save(); render(); return;
    }

    if(act==="offer"){ offerRecruit(el.dataset.id); await save(); render(); return; }
    if(act==="sell"){
      const t = getUserTeam();
      const r = S.recruits.find(x=>x.id===el.dataset.id);
      if(!t || !r) return;
      applyRecruitAction(t, S.userCoach, r, el.dataset.kind);
      await save(); render(); return;
    }

    if(act==="visit_confirm"){
      const t = getUserTeam();
      const rid = el.dataset.rid;
      const r = S.recruits.find(x=>x.id===rid);
      if(!t || !r) return;

      const wk = parseInt(document.getElementById("visit_week_sel")?.value||"", 10);
      const cost = ACTIONS.visit.cost;

      const avail = t.recruiting.points - t.recruiting.spent;
      if(cost > avail) return toast("No Points", `Only ${avail} left.`, "bad");

      t.recruiting.spent += cost;
      r.visitScheduled[t.id] = wk;

      toast("Visit Scheduled", `${r.name}`, "good");
      clearModal();
      await save(); render(); return;
    }

    if(act==="rf_apply"){
      S.ui.recruitFilters.pos = document.getElementById("rf_pos")?.value||"";
      S.ui.recruitFilters.state = document.getElementById("rf_state")?.value||"";
      S.ui.recruitFilters.stars = document.getElementById("rf_stars")?.value||"";
      S.ui.recruitFilters.sort = document.getElementById("rf_sort")?.value||"rank";
      S.ui.recruitFilters.board = document.getElementById("rf_board")?.value || "all";
      await save(); render(); return;
    }
    if(act==="rf_clear"){
      S.ui.recruitFilters = {pos:"",state:"",stars:"",sort:"rank",board:"all"};
      await save(); render(); return;
    }

    if(act==="accept_job"){
      acceptJob(el.dataset.id);
      await save(); render(); return;
    }

    if(act==="rv_apply"){ S.ui.rosterPos = document.getElementById("rv_pos")?.value||""; await save(); render(); return; }
    if(act==="rv_clear"){ S.ui.rosterPos = ""; await save(); render(); return; }

    if(act==="save_settings"){
      S.settings.xpSpeed = parseFloat(document.getElementById("set_xp")?.value||"1");
      S.settings.spRate = parseFloat(document.getElementById("set_sp")?.value||"1");
      S.settings.infiniteSP = (document.getElementById("set_inf")?.value==="1");
      S.settings.hideLockedRecruits = (document.getElementById("set_hide")?.value==="1");
      S.settings.difficulty = parseFloat(document.getElementById("set_diff")?.value||"1.05");
      toast("Settings Saved","Applied.", "good");
      await save(); render(); return;
    }

  }catch(e){
    console.error(e);
    toast("Runtime Error", e?.message || "Unknown error", "bad");
  }
}

/* ---------- Click routing ---------- */
document.addEventListener("click", (e)=>{
  const bg = e.target?.id==="drawer" ? e.target : null;
  if(bg && bg.classList.contains("drawerOverlay") && bg.classList.contains("open")){
    if(e.target === bg) drawerClose();
    return;
  }
  const el = e.target.closest("[data-act]");
  if(!el) return;
  handle(el.dataset.act, el);
});

/* ---------- Boot ---------- */
(async function boot(){
  const loaded = await loadSave();
  if(loaded) S = loaded;

  if(S){
    S.settings ??= { hideLockedRecruits:false, xpSpeed:1, spRate:1, infiniteSP:false, difficulty:1.05 };
    S.records ??= buildInitialRecords();
    S.polls ??= { apTop25:[], lastReason:"" };
    S.jobs ??= { offers: [] };
    S.post ??= { confTourneys:[], ncaa:null };
    S.ui ??= { modalQueue:[], rosterPos:"", recruitFilters:{pos:"",state:"",stars:"",sort:"rank",board:"all"}, rankingView:"ap" };

    updatePolls("boot");
  }

  render();
})();
</script>
