/* ---------- Team Picker (Bottom-25 start rule) ---------- */
function getBottom25Set(){
  const teams = S.league.teams.slice().sort((a,b)=>a.prestige-b.prestige);
  return new Set(teams.slice(0,25).map(t=>t.id));
}
function openTeamPicker(confFilter, search){
  const teams = S.league.teams.slice();
  const forceBottom = !(S.flags?.startedCareer);
  const bottom25 = getBottom25Set();

  const filtered = teams.filter(t=>{
    const okConf = confFilter ? (t.conf===confFilter) : true;
    const okSearch = search ? t.name.toLowerCase().includes(search.toLowerCase()) : true;
    const okBottom = forceBottom ? bottom25.has(t.id) : true;
    return okConf && okSearch && okBottom;
  }).sort((a,b)=>a.prestige-b.prestige);

  document.getElementById("app").innerHTML = `
    <div class="card">
      <h2>Pick Your Team</h2>
      <div class="muted">${forceBottom ? "Career start rule: you must pick a Bottom-25 program (by prestige)." : "Select any school."}</div>
      <div class="sep"></div>
      <div class="list">
        ${filtered.slice(0,220).map(t=>`
          <div class="itemCard">
            <div class="itemTop">
              <div>
                <div class="itemTitle">${U.safe(t.name)} ${forceBottom ? `<span class="badge bWarn">Bottom-25</span>` : ""}</div>
                <div class="itemMeta">${U.safe(t.conf)} • Prest ${t.prestige} • OVR ${t.ovr}</div>
              </div>
              <button class="btnGood" data-act="select_team" data-team="${t.id}">Select</button>
            </div>
          </div>
        `).join("")}
      </div>
    </div>
    <div style="height:12px"></div>
    <button data-act="close_picker">Back</button>
  `;
}

/* ---------- Render ---------- */
function render(){
  updateSubline();
  renderDrawerNav();
  const app = document.getElementById("app");

  if(!S){
    app.innerHTML = `
      <div class="card">
        <h2>Welcome</h2>
        <div class="muted">No save found. Start a new dynasty.</div>
        <div class="sep"></div>
        <button class="btnAccent" data-act="new_game">New Game</button>
        <button data-act="load">Load Save</button>
      </div>
    `;
    renderOverlay();
    return;
  }

  const view = ({
    home: renderHome,
    coach: renderCoach,
    roster: renderRoster,
    schedule: renderSchedule,
    recruit: renderRecruiting,
    portal: renderPortal,
    staff: renderStaff,
    jobs: renderJobs,
    records: renderRecords,
    settings: renderSettings,
  }[activeTab] || renderHome)();

  app.innerHTML = view;
  renderOverlay();
}

/* ---------- Actions ---------- */
async function handle(act, el){
  try{
    if(act==="drawer_open"){ drawerOpen(); return; }
    if(act==="drawer_close"){ drawerClose(); return; }

    if(act==="new_game"){ newGame(); await save(); toast("New Game","Dynasty created.","good"); render(); return; }

    if(act==="load"){
      const v=await loadSave();
      if(!v){toast("No Save","No save found.","bad");return;}
      S=v;

      // backfill
      if(!S.records) S.records = buildInitialRecords();
      if(!S.post) S.post = { confTourneys:{}, autoBids:[], bracket:null, madeTourney:false, tourneyWins:0 };
      if(!S.settings) S.settings = { xpSpeed:1.0, skillPointRate:1.0, infiniteXP:false, portalRate:0.065, cpuPortalMult:1.0, userPortalMult:1.0 };
      if(!S.flags) S.flags = { startedCareer: !!S.userTeamId };
      if(!S.ui) S.ui = { rosterPos:"", recruitFilters:{pos:"",state:"",stars:"",sort:"rank",targetsOnly:false,pitch:"brand"}, portalFilters:{pos:"",sort:"ovr"}, modalQueue:[], lastRecap:null, retention:{attemptsUsed:0, atRisk:[]} };

      for(const t of (S.league?.teams||[])){
        t.recruiting ??= { points:0, spent:0, offered:[], spentMap:{}, commits:[], classSlots:4 };
        t.recruiting.offered ??= [];
        t.recruiting.commits ??= [];
        t.recruiting.spentMap ??= {};
        for(const p of (t.roster||[])) ensureStats(p);
        recomputeScholarships(t);
        computeNeeds(t);
        computeGrades(t);
      }
      for(const r of (S.recruits||[])){
        r.offers ??= [];
        r.delta ??= {};
        r.visitedBy ??= {};
        r.visitScheduled ??= {};
        r.visitPitch ??= {};
      }

      toast("Loaded","Save loaded.","good");
      render(); return;
    }

    if(act==="save"){ await save(); toast("Saved","Saved.","good"); render(); return; }
    if(act==="hard_reset"){ await hardReset(); toast("Reset","Save deleted.","warn"); render(); return; }

    if(act==="tab"){ activeTab = el.dataset.tab; drawerClose(); render(); return; }

    if(act==="modal_ack"){ clearModal(); await save(); render(); return; }

    if(act==="visit_confirm"){
      const t = getUserTeam();
      const rid = el.dataset.rid;
      const r = S.recruits.find(x=>x.id===rid);
      if(!t || !r) return;

      const wk = parseInt(document.getElementById("visit_week_sel")?.value||"", 10);
      const pitch = document.getElementById("visit_pitch_sel")?.value || "brand";
      const cost = ACTIONS.visit.cost;

      const avail = t.recruiting.points - t.recruiting.spent;
      if(cost > avail) return toast("No Points", `Only ${avail} points left.`, "bad");

      t.recruiting.spent += cost;
      t.recruiting.spentMap[r.id] = (t.recruiting.spentMap[r.id]||0) + cost;

      r.visitScheduled[t.id] = wk;
      r.visitPitch[t.id] = pitch;

      toast("Visit Scheduled", `${r.name} — ${weekName(wk)}`, "good");
      clearModal();
      await save(); render(); return;
    }

    if(act==="create_coach"){
      const name = (document.getElementById("coach_name")?.value||"").trim() || ("Coach " + U.pick(NAME.coachLast));
      S.userCoach = makeCoach({name});
      toast("Coach Created", `${S.userCoach.name} (HC)`, "good");
      await save(); render(); return;
    }

    if(act==="team_picker"){
      if(!S.userCoach) return toast("Coach Required","Create coach first.","bad");
      const conf = document.getElementById("team_conf")?.value||"";
      const search = document.getElementById("team_search")?.value||"";
      openTeamPicker(conf, search);
      return;
    }
    if(act==="close_picker"){ render(); return; }

    if(act==="select_team"){
      if(!S.userCoach) return toast("Coach Required","Create coach first.","bad");
      const team = getTeam(el.dataset.team);

      // ✅ enforce bottom-25 start rule on first selection
      const bottom25 = getBottom25Set();
      if(!S.flags?.startedCareer && !bottom25.has(team.id)){
        return toast("Restricted", "Career start must be with a Bottom-25 team.", "bad");
      }

      S.userTeamId = team.id;
      placeUserCoachOnTeam(team, S.userCoach);
      S.phase="season";
      S.weekIndex=0;
      resetForNewSeason();
      setGoals();

      S.flags.startedCareer = true; // lock in that career has begun

      toast("Team Selected", `${team.name} • HC`, "good");
      await save(); render(); return;
    }

    if(act==="advance" || act==="sim"){
      advance();
      await save();
      render();
      return;
    }

    if(act==="perk"){
      upgradeNode(S.userCoach, el.dataset.arch, el.dataset.key);
      await save(); render(); return;
    }

    if(act==="offer"){ offerRecruit(el.dataset.id); await save(); render(); return; }

    if(act==="sell"){
      const t = getUserTeam();
      const r = S.recruits.find(x=>x.id===el.dataset.id);
      if(!t || !r) return;

      // extra safety: if offered-board has it but recruit.offers doesn't, sync it
      if(t.recruiting.offered?.includes(r.id) && !(r.offers||[]).includes(t.id)){
        ensureUserOffer(t, r);
      }

      const kind = el.dataset.kind;
      const pitch = S.ui.recruitFilters.pitch || "brand";
      applyRecruitAction(t, S.userCoach, r, kind, pitch);
      await save(); render(); return;
    }

    if(act==="ppts"){ portalSpend(el.dataset.id, parseInt(el.dataset.pts,10)); await save(); render(); return; }
    if(act==="persuade"){ persuadeKeep(el.dataset.id); await save(); render(); return; }

    if(act==="accept_job"){ acceptJob(el.dataset.id); await save(); render(); return; }

    if(act==="rf_apply"){
      S.ui.recruitFilters.pos = document.getElementById("rf_pos")?.value||"";
      S.ui.recruitFilters.state = document.getElementById("rf_state")?.value||"";
      S.ui.recruitFilters.stars = document.getElementById("rf_stars")?.value||"";
      S.ui.recruitFilters.sort = document.getElementById("rf_sort")?.value||"rank";
      S.ui.recruitFilters.targetsOnly = (document.getElementById("rf_targets")?.value==="1");
      S.ui.recruitFilters.pitch = document.getElementById("rf_pitch")?.value || "brand";
      await save(); render(); return;
    }
    if(act==="rf_clear"){ S.ui.recruitFilters={pos:"",state:"",stars:"",sort:"rank",targetsOnly:false,pitch:"brand"}; await save(); render(); return; }

    if(act==="pf_apply"){
      S.ui.portalFilters.pos = document.getElementById("pf_pos")?.value||"";
      S.ui.portalFilters.sort = document.getElementById("pf_sort")?.value||"ovr";
      await save(); render(); return;
    }
    if(act==="pf_clear"){ S.ui.portalFilters={pos:"",sort:"ovr"}; await save(); render(); return; }

    if(act==="rv_apply"){ S.ui.rosterPos = document.getElementById("rv_pos")?.value||""; await save(); render(); return; }
    if(act==="rv_clear"){ S.ui.rosterPos = ""; await save(); render(); return; }

    if(act==="save_settings"){
      const xp = parseFloat(document.getElementById("set_xp")?.value||"1");
      const sp = parseFloat(document.getElementById("set_sp")?.value||"1");
      const inf = (document.getElementById("set_inf")?.value==="1");
      const pr = parseFloat(document.getElementById("set_pr")?.value||"0.065");
      const cpu = parseFloat(document.getElementById("set_cpu")?.value||"1");
      const usr = parseFloat(document.getElementById("set_usr")?.value||"1");

      S.settings.xpSpeed = U.clamp(xp,0.25,4);
      S.settings.skillPointRate = U.clamp(sp,0.5,4);
      S.settings.infiniteXP = !!inf;
      S.settings.portalRate = U.clamp(pr,0,0.18);
      S.settings.cpuPortalMult = U.clamp(cpu,0.2,2.5);
      S.settings.userPortalMult = U.clamp(usr,0.2,2.5);

      toast("Settings Saved","Tuning applied.", "good");
      await save(); render(); return;
    }

  }catch(e){
    console.error(e);
    toast("Runtime Error", e?.message || "Unknown error", "bad");
  }
}

document.addEventListener("click", (e)=>{
  const bg = e.target?.id==="drawer" ? e.target : null;
  if(bg && bg.classList.contains("drawerOverlay") && bg.classList.contains("open")){
    if(e.target === bg) drawerClose();
    return;
  }
  const el = e.target.closest("[data-act]");
  if(!el) return;
  handle(el.dataset.act, el);
});

/* ---------- Boot ---------- */
(async function boot(){
  const loaded = await loadSave();
  if(loaded) S = loaded;
  render();
})();
</script>
</body>
</html>
